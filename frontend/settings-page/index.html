<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>B24 Calendar Sync Settings</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="card">
        <div class="card__header">
          <div>
            <p class="eyebrow">Embedded settings</p>
            <h1>B24 → Yandex sync MVP</h1>
          </div>
          <button id="refreshSettingsButton" class="button button--secondary" type="button">Refresh</button>
        </div>
        <p id="statusBanner" class="banner" role="status" aria-live="polite">Loading configuration…</p>
      </section>

      <section class="grid">
        <form id="settingsForm" class="card form-card">
          <h2>Yandex connection</h2>
          <label>
            <span>Yandex username</span>
            <input id="yandexUsername" name="yandexUsername" type="email" inputmode="email" autocomplete="username" autocapitalize="none" autocorrect="off" spellcheck="false" placeholder="login@yandex.ru" />
          </label>
          <label>
            <span>Yandex password / app password</span>
            <input id="yandexPassword" name="yandexPassword" type="password" autocomplete="new-password" autocapitalize="none" spellcheck="false" aria-describedby="yandexPasswordHint" />
          </label>
          <p id="yandexPasswordHint" class="field-hint">Saved app passwords stay on the server and are never prefilled back into the iframe.</p>
          <label class="checkbox-row">
            <input id="syncEnabled" name="syncEnabled" type="checkbox" />
            <span>Enable sync pipeline</span>
          </label>
          <div class="actions">
            <button class="button" type="submit">Save settings</button>
          </div>
        </form>

        <section class="card form-card">
          <h2>Calendar and sync</h2>
          <div class="calendar-actions">
            <button id="loadYandexCalendarsButton" class="button button--secondary" type="button">Connect and load Yandex calendars</button>
          </div>
          <label>
            <span>Yandex calendar</span>
            <select id="yandexCalendarUrl" name="yandexCalendarUrl"></select>
          </label>
          <div class="actions actions--stacked">
            <button id="manualSyncButton" class="button" type="button">Run full resync</button>
          </div>
          <dl class="summary-grid">
            <div>
              <dt>Connection</dt>
              <dd id="connectionStatus">Unknown</dd>
            </div>
            <div>
              <dt>Last sync</dt>
              <dd id="lastSyncValue">Never</dd>
            </div>
            <div>
              <dt>Last error</dt>
              <dd id="lastErrorValue">None</dd>
            </div>
          </dl>
          <div class="status-box">
            <h3>Runtime status</h3>
            <pre id="runtimeStatus">No status loaded yet.</pre>
          </div>
        </section>
      </section>
    </main>

    <script src="./app.js" defer></script>
  </body>
  </html>
